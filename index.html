<!DOCTYPE html>

<div class="wrap">

    <nav class="site-nav">

      <a href="about.html">关于</a>
    </nav>
  </header>

  <div class="state-line" id="stateLine"></div>

  <section>
    <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
    <div class="caption">账户余额 · 虚线为初始余额 · 含全部已结算信号</div>

  <section id="statsSection">
    <div class="stats-row" id="statsRow"></div>
  </section>

  <section>
    <div class="csv-link-row">
      <span>完整原始数据：<a href="https://github.com/NegentropyLab/test/blob/main/track_record.csv" target="_blank" rel="noopener">查看 track_record.csv ↗</a></span>
      <span class="csv-link-sep">加密存证：<a href="https://github.com/NegentropyLab/test/tree/main/csv" target="_blank" rel="noopener">/csv 目录 ↗</a></span>

    <div id="loading" class="loading">正在读取 track_record.csv…</div>
    <div class="table-scroll">

        <tr>
          <th class="num">编号</th>
          <th>比赛时间</th>
          <th>联赛</th>
          <th>赛事</th>

          <th class="num">下注资金</th>

          <th class="num">盈亏</th>
          <th class="num">余额</th>
          <th>核验</th>
        </tr>

      <tbody id="recordBody"></tbody>
    </table>
    </div>
    <button class="load-more" id="loadMore" style="display:none">加载更多</button>

  <footer class="site-footer">
    <div class="footer-brand">
